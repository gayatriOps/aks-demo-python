trigger:
- main

pool:
  Name: AzureAgent

variables:
  imageName: 'aks-demo-python'
  aksNamespace: 'aks-demo-python'
  azureSubscription: 'MyAzureServiceConnection'
  acrName: 'MyACRName'
  aksResourceGroup: 'MyAKSResourceGroup'
  aksClusterName: 'MyAKSCluster'

stages:
- stage: Test
  displayName: Run tests and linting
  jobs:
  - job: Test
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '3.11'
    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install flake8
      displayName: 'Install dependencies'
    - script: |
        flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 app.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      displayName: 'Run flake8 linting'
    - script: |
        pytest tests/ --verbose --tb=short
      displayName: 'Run tests'

- stage: Build
  displayName: Build and push image
  jobs:
  - job: Build
    steps:
    - task: Docker@2
      displayName: Build and push Docker image
      inputs:
        containerRegistry: 'MyACRServiceConnection'
        repository: 'aks-demo-python'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)

- stages:
- stage: DeployDev
  jobs:
  - job: Deploy
    steps:
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'MyAzureServiceConnection'
        azureResourceGroup: 'aks-demo-rg'
        kubernetesCluster: 'aks-demo-cluster'
        namespace: 'dev'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'manifests/deployment.yaml'

- stage: DeployQA
  dependsOn: DeployDev
  jobs:
  - job: Deploy
    steps:
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'MyAzureServiceConnection'
        azureResourceGroup: 'aks-demo-rg'
        kubernetesCluster: 'aks-demo-cluster'
        namespace: 'qa'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'manifests/deployment.yaml'

- stage: DeployProd
  dependsOn: DeployQA
  jobs:
  - job: Deploy
    steps:
    - task: Kubernetes@1
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'MyAzureServiceConnection'
        azureResourceGroup: 'aks-demo-rg'
        kubernetesCluster: 'aks-demo-cluster'
        namespace: 'prod'
        command: 'apply'
        useConfigurationFile: true
        configuration: 'manifests/deployment.yaml'

    - task: AzureCLI@2
      displayName: Deploy to AKS with kubectl
      inputs:
        azureSubscription: '$(azureSubscription)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          ACR_LOGIN_SERVER=$(az acr show --name $(acrName) --query loginServer -o tsv)
          IMAGE="${ACR_LOGIN_SERVER}/$(imageName):$(Build.BuildId)"
          kubectl create namespace $(aksNamespace) --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set image deployment/aks-demo-python aks-demo-python=$IMAGE -n $(aksNamespace)